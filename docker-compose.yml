version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dental_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dental_db
      TZ: "Asia/Tokyo"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
